<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PianoPath</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- PAGE 1 -->
  <div id="page-1">
    <h1>🎹 PianoPath</h1>
    <p class="subtitle">What would you like to work on today?</p>
    <div class="buttons">
      <button onclick="goTo('sight-reading', '🎵 Sight Reading')">🎵 Sight Reading</button>
      <button onclick="goTo('scales', '🎼 Scales')">🎼 Scales</button>
      <button onclick="goTo('arpeggios', '🎶 Arpeggios')">🎶 Arpeggios</button>
      <button onclick="goTo('chords', '🎹 Chords')">🎹 Chords</button>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div id="page-2">
    <button class="back-btn" onclick="showPage('page-1')">← Back</button>
    <h1 id="page2-title"></h1>
    <p class="subtitle">What would you like to do?</p>
    <div class="buttons">
      <button>📖 Learn</button>
      <button onclick="practiceClick()">🎯 Practice</button>
    </div>
  </div>

  <!-- PAGE 3 -->
  <div id="page-3">
    <button class="back-btn" onclick="showPage('page-2')">← Back</button>
    <h1>🎵 Sight Reading</h1>
    <p class="subtitle">Which clef would you like to practice?</p>
    <div class="buttons">
      <button onclick="startPractice('treble')">𝄞 Treble Clef</button>
      <button onclick="startPractice('bass')">𝄢 Bass Clef</button>
      <button onclick="startPractice('both')">𝄞𝄢 Both</button>
    </div>
  </div>

  <!-- PAGE 4 - SIGHT READING PRACTICE -->
  <div id="page-4">
    <button class="back-btn" onclick="showPage('page-3')">← Back</button>
    <h1>🎯 Sight Reading Practice</h1>

    <div id="staff-area"></div>

    <div id="keyboard-area"></div>

    <div id="feedback"></div>

    <div class="buttons" style="margin-top: 2rem;">
      <button onclick="nextNote()">Next Note →</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
